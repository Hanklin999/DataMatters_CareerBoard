name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Static lint
        run: npm run lint

      - name: Data validation
        run: npm run validate:data

      - name: Existing and v3 tests
        run: npm test

      - name: Production build
        run: npm run build
